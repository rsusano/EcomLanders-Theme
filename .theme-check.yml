# Theme Check configuration for EcomLanders-Theme
# See: https://shopify.dev/docs/storefronts/themes/tools/theme-check/configuration

# The UnclosedHTMLElement rule produces false positives when HTML tags are
# intentionally opened/closed inside separate Liquid conditional branches
# (e.g. the benefit <ul> and bundle <div> wrappers in product-info-advanced.liquid).
# These render correctly at runtime — theme-check cannot follow cross-branch logic.
UnclosedHTMLElement:
  enabled: false

# theme-check's CSS parser does not recognise @starting-style (CSS Transitions
# Level 2 — valid in all modern browsers). Suppressing CSSLint avoids false
# "Unknown at rule" warnings for this and other modern CSS features.
CSSLint:
  enabled: false

# Header reuses the same static block (header-menu) for menu, drawer, and nav bar
# variants — intentional pattern. Each content_for uses variant: to switch context.
UniqueStaticBlockId:
  ignore:
    - sections/header.liquid
